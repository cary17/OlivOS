version: '3.8'

services:
  # 完整版：核心 + 插件生态 + OPK 插件（生产推荐）
  olivos-full:
    image: ghcr.io/cary17/olivos:latest
    container_name: olivos
    restart: always
    volumes:
      - ./conf:/app/OlivOS/conf
      - ./plugin:/app/OlivOS/plugin
      - ./data:/app/OlivOS/data
    environment:
      TZ: Asia/Shanghai
      EXTRA_PACKAGES: ""
    ports:
      - "8080:8080"

  # 核心版：核心 + 插件生态，无 OPK 插件（轻量生产）
  olivos-core:
    image: ghcr.io/cary17/olivos:latest-core
    container_name: olivos-core
    restart: always
    volumes:
      - ./conf:/app/OlivOS/conf
      - ./plugin:/app/OlivOS/plugin
      - ./data:/app/OlivOS/data
    environment:
      TZ: Asia/Shanghai
    ports:
      - "8081:8080"

  # 开发版：核心 + 插件生态 + 开发工具（开发调试）
  olivos-dev:
    image: ghcr.io/cary17/olivos:latest-dev
    container_name: olivos-dev
    restart: unless-stopped
    volumes:
      - ./conf:/app/OlivOS/conf
      - ./plugin:/app/OlivOS/plugin
      - ./source:/app/OlivOS  # 挂载源码用于开发
      - ./logs:/app/OlivOS/logs
    environment:
      TZ: Asia/Shanghai
      EXTRA_PACKAGES: "ipython debugpy"
      PYTHONBREAKPOINT: ipdb.set_trace
    ports:
      - "8082:8080"
      - "5678:5678"  # debugpy 调试端口
    stdin_open: true
    tty: true
